<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LDRWIN - Mines</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>LDRWIN - Jogo Mines</h1>
    <div class="auth">
      <input id="email" type="email" placeholder="Email" />
      <input id="senha" type="password" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
      <button onclick="register()">Cadastrar</button>
    </div>

    <div class="dashboard" style="display:none;">
      <p><strong>Saldo Real:</strong> R$<span id="saldoReal">0</span></p>
      <p><strong>Saldo Bônus:</strong> R$<span id="saldoBonus">0</span></p>
      <p><strong>Rollover:</strong> R$<span id="apostasAcumuladas">0</span> / R$200</p>
      <p><strong>Bônus Liberado:</strong> <span id="bonusLiberado">Não</span></p>

      <div class="game">
        <input id="aposta" type="number" step="0.01" min="0.5" max="100" placeholder="Valor da aposta" />
        <input id="bombas" type="number" min="3" max="24" value="5" />
        <button onclick="jogar()">Jogar</button>
      </div>

      <div id="mensagem"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
